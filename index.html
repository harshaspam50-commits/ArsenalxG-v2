<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsenal Analytics Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-red-500">Arsenal FC Analytics</h1>
                <p class="text-slate-400 mt-2">10-Game Rolling Averages: xG vs. xGA (Understat Data)</p>
            </div>
            <div class="text-sm text-slate-500">
                Data auto-updates daily
            </div>
        </header>

        <div class="bg-slate-800 p-6 rounded-xl shadow-lg">
            <canvas id="arsenalChart" height="120"></canvas>
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                
                // Extract the data arrays matching our new Understat variables
                const labels = data.map(match => `${match.date} (vs ${match.opponent})`);
                const rollingXG = data.map(match => match.rolling_xG);
                const rollingXGA = data.map(match => match.rolling_xGA);
                const rollingDiff = data.map(match => match.rolling_difference);

                // Dynamically build the season divider lines
                const seasonAnnotations = {};
                let previousSeason = null;
                let annotationCount = 0;

                data.forEach((match, index) => {
                    if (previousSeason !== null && match.season !== previousSeason) {
                        // Calculate the display year (e.g., "2024" becomes "2024/2025")
                        const nextYear = parseInt(match.season) + 1;
                        
                        seasonAnnotations[`line${annotationCount}`] = {
                            type: 'line',
                            xMin: index,
                            xMax: index,
                            borderColor: 'rgba(148, 163, 184, 0.4)', // Faded slate
                            borderWidth: 2,
                            borderDash: [5, 5],
                            label: {
                                display: true,
                                content: `${match.season}/${nextYear} Season Starts`,
                                position: 'start',
                                backgroundColor: 'rgba(15, 23, 42, 0.8)',
                                color: '#94a3b8',
                                font: { size: 11 }
                            }
                        };
                        annotationCount++;
                    }
                    previousSeason = match.season;
                });

                const ctx = document.getElementById('arsenalChart').getContext('2d');
                
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Rolling Expected Goals (xG)',
                                data: rollingXG,
                                borderColor: '#EF0107', // Arsenal Red
                                backgroundColor: 'rgba(239, 1, 7, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 2
                            },
                            {
                                label: 'Rolling Expected Goals Against (xGA)',
                                data: rollingXGA,
                                borderColor: '#0284c7', // Tailwind light blue
                                backgroundColor: 'rgba(2, 132, 199, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 2
                            },
                            {
                                label: 'Difference (xG - xGA)',
                                data: rollingDiff,
                                borderColor: '#10b981', // Tailwind emerald green
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                borderWidth: 2,
                                borderDash: [5, 5],
                                tension: 0.3,
                                pointRadius: 0
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        scales: {
                            x: {
                                ticks: { color: '#94a3b8', maxRotation: 45, minRotation: 45 },
                                grid: { color: '#334155' }
                            },
                            y: {
                                ticks: { color: '#94a3b8' },
                                grid: { color: '#334155' }
                            }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#f8fafc' }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                titleColor: '#f8fafc',
                                bodyColor: '#cbd5e1',
                                padding: 12
                            },
                            annotation: {
                                annotations: seasonAnnotations
                            }
                        }
                    }
                });
            })
            .catch(error => console.error('Error loading the JSON data:', error));
    </script>
</body>
</html>
